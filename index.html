k",viewDetail:"View Details",close:"Close",detailLabels:{problem:"// problem",solution:"// solution",impact:"// impact",highlights:"// highlights",stack:"// stack"},items:[{num:"01",name:"Banner AI",desc:"AI-powered promotional banner generator for e-commerce — Excel/Sheets data in, production-ready PNG out.",tags:["Python","FastAPI","Gemini API","OpenAI","Cloud Run","Computer Vision","GCS"],featured:!0,detail:{problem:"Marketing teams spent hours manually composing promotional banners for each product and season, with no scalable template system and no way to inject live product data.",solution:"Built a FastAPI backend with a canvas editor web app. Pulls product data from Excel or Google Sheets, maps columns to template layout slots, calls Gemini or OpenAI for AI-generated backgrounds and imagery, and renders a downloadable PNG or HTML banner. Figma URL import lets designers define layouts graphically without writing code.",impact:"Reduced banner production time from hours to minutes per batch. The service is fully automated from data input to final export, and deployed on Cloud Run with CI/CD via GitHub Actions.",highlights:["Gemini Vision & OpenAI DALL-E integration for AI background/image generation","rembg for automated background removal from product photos","Canvas editor with layer management, z-order, text binding, and shape tools","Google Cloud Storage for persistent asset storage","GitHub Actions → Cloud Run CI/CD auto-deploy pipeline"]}},{num:"02",name:"Marketing Report",desc:"Auto-generates monthly Instagram performance reports — no API tokens, no manual work, Gemini-powered insights.",tags:["Python","Flask","Apify","Gemini API","GCS","python-pptx"],featured:!1,detail:{problem:"Marketing managers needed monthly Instagram performance reports but lacked the developer resources to integrate Instagram's OAuth-heavy Graph API and maintain access tokens.",solution:"Flask web app that uses Apify scrapers (no token or Instagram Business Account needed) to collect profile and reel data on a daily schedule. Computes month-over-month KPIs, generates interactive HTML reports and downloadable PPTX slides, with optional Gemini AI narrative insights that summarize trends in plain language.",impact:"Eliminated manual report compilation entirely. Non-technical marketers can generate data-backed monthly reports on demand, covering multiple accounts simultaneously.",highlights:["Apify-based Instagram scraping — zero OAuth or Business Account requirement","Gemini AI auto-generates narrative insights from raw KPI data","python-pptx slide deck generation for presentation-ready output","Daily GCS snapshots for month-over-month trend tracking"]}},{num:"03",name:"AutoSheet",desc:"Turns spreadsheet images and Excel files into formatted Google Sheets, then auto-generates Google Slides cue sheets for livestream.",tags:["FastAPI","Gemini Vision","Google Sheets API","Google Slides API","Cloud Run","OAuth2"],featured:!1,detail:{problem:"Livestream e-commerce teams received product data in inconsistent Excel formats and had to manually reformat into Google Sheets, then manually create cue-sheet slides for on-air presenters — a two-step daily bottleneck.",solution:"FastAPI service that accepts Excel files, Google Sheet URLs, or table image uploads. Gemini Vision OCR parses table images directly into structured data. The AutoQue module then reads the standardized sheet and auto-generates Google Slides cue sheets, one slide per product row, applying the team's layout template.",impact:"Compressed a 2-step manual workflow (reformat data → build slides) into a single upload action. Deployed on Cloud Run with per-account OAuth2 so multiple team members can each access their own data securely.",highlights:["Gemini Vision OCR for parsing table images into structured spreadsheet data","Google Sheets, Slides, and Drive API integration via google-api-python-client","Per-account OAuth2 authentication flow","Cloud Run deployment (asia-northeast3 region)"]}},{num:"04",name:"Influencer List Updater",desc:"Google Apps Script pipeline that auto-populates an influencer database with live Instagram stats and Gemini AI category classification.",tags:["Google Apps Script","Apify","Gemini API","Google Sheets","Automation"],featured:!1,detail:{problem:"Marketing team manually tracked an influencer spreadsheet — updating follower counts, engagement rates, and content categories. Each refresh cycle took 2+ days of manual research and data entry.",solution:"Google Apps Script pipeline that reads a list of Instagram handles from a sheet, calls Apify's Instagram Profile Scraper to fetch live stats (followers, engagement rate, post counts), then sends each profile to Gemini API for category classification. Updates sheet rows in-place. Configurable daily processing quotas keep the pipeline within Apify and Gemini API rate limits.",impact:"Reduced influencer data refresh from 2+ days of manual work to an automated overnight run. The pipeline scales to hundreds of profiles without additional effort.",highlights:["Apify Instagram Profile Scraper for live stats without API credentials","Gemini API for automated influencer category classification","Google Apps Script time-based triggers for scheduled execution","Configurable daily-quota rate limiting to stay within API budgets"]}},{num:"05",name:"KLANG Website",desc:"Official marketing site for a performance-matching platform — responsive, animated, with process flows and inquiry forms.",tags:["React 18","TypeScript","Vite","Tailwind CSS 4","Radix UI","MUI"],featured:!1,detail:{problem:"KLANG, a platform connecting performing artists with venues, needed a polished public-facing website to communicate its value proposition and generate leads from both artists and venue operators.",solution:"Built with React 18, Vite, TypeScript, Tailwind CSS 4, and Radix UI primitives. Implemented scroll-triggered animations using IntersectionObserver, an interactive service comparison section, a portfolio carousel showcasing past events, and validated inquiry forms with real-time feedback.",impact:"Launched as the platform's official marketing site. Serves as the primary channel for artist and venue discovery, replacing a temporary placeholder page.",highlights:["React 18 + TypeScript + Vite with full type safety","Tailwind CSS 4 utility-first styling with responsive breakpoints","Radix UI + MUI component primitives for accessible interactions","Scroll-triggered animation system using IntersectionObserver"]}},{num:"06",name:"imweb Cancel Notifier",desc:"Chrome Extension (MV3) that pushes real-time desktop notifications the moment a cancel-order request appears on an imweb shop.",tags:["Chrome Extension MV3","Service Worker","imweb REST API","chrome.alarms"],featured:!1,detail:{problem:"Shop admins on imweb e-commerce platform missed cancel-order requests because the admin panel required manual page refresh. Delayed responses led to customer disputes and negative reviews.",solution:"Chrome Extension (Manifest V3) with a background Service Worker that polls the imweb REST API at a configurable interval using chrome.alarms. The moment a CANCEL_REQUEST status appears, it fires a native desktop notification with the order number. An options page lets admins enter their imweb API Key/Secret and set the polling interval without touching code.",impact:"Shop admins receive real-time cancel alerts with zero manual monitoring. Missed cancel requests dropped to zero after deployment.",highlights:["Chrome Extension Manifest V3 architecture with Service Worker","chrome.alarms API for reliable background polling intervals","chrome.notifications for native desktop push notifications","chrome.storage for secure API credential persistence"]}},{num:"07",name:"SMB Platform Monitor",desc:"Headless crawler that monitors a JS-rendered government portal for new announcements and sends instant email alerts.",tags:["Python","Playwright","BeautifulSoup","SMTP","Cloud Run Jobs"],featured:!1,detail:{problem:"SMBs needed to catch government innovation-voucher announcements the moment they posted to apply before quotas filled, but the portal rendered content with JavaScript (no RSS, no API) and required constant manual checking.",solution:"Python script using Playwright (headless Chromium) to fully render the JS-heavy announcement portal, BeautifulSoup to parse the post list, and a JSON state file to diff against the previous run. On any new post, sends an SMTP email alert immediately. Schedulable as a Cloud Run Job, Cloud Function, or local cron. Includes a --test-email flag for setup verification.",impact:"Enables businesses to respond to government funding opportunities within minutes of posting, replacing daily manual checks.",highlights:["Playwright headless Chromium for JavaScript-rendered page scraping","BeautifulSoup for HTML post-list parsing and extraction","JSON state file diffing for reliable new-post detection","SMTP email alerts with Gmail compatibility"]}}]},contact:{label:"// contact",heading:"Let's build something together.",sub:"I turn ideas into production-ready AI services.",email:"heywon16@gmail.com",copy:"Copy email",copied:"Copied!"},footer:{built:"Designed & built by Hong Hyewon (Amy Hong)",year:"2025"}},ko:{nav:{about:"About",skills:"Skills",projects:"Projects",contact:"Contact"},hero:{badge:"AI 엔지니어 · 서비스 개발자",name:"홍혜원",nameRoman:"Amy Hong",tagline:"LLM 파이프라인부터 클라우드 배포까지 — 실제로 작동하는 AI 서비스를 만듭니다.",cta1:"프로젝트 보기",cta2:"GitHub",available:"기회에 열려 있습니다"},about:{label:"// about",heading:"API와 LLM으로 실제 시간을 절약하는 프로덕션 툴을 만듭니다.",p1:"AI 자동화에 특화된 서비스 개발자입니다. Gemini Vision으로 스프레드시트 이미지를 파싱하는 파이프라인부터, GitHub Actions CI/CD로 Google Cloud Run에 배포되는 Flask/FastAPI 서비스까지 엔드-투-엔드 시스템을 구축합니다.",p2:"제가 만드는 모든 툴은 실제 사용자의 측정 가능한 비즈니스 문제를 해결합니다. AI 엔지니어링과 프로덕트 사고의 교차점에 서 있습니다.",stats:[{n:"14+",label:"프로젝트"},{n:"7",label:"클라우드 배포"},{n:"5",label:"AI API 연동"},{n:"3+",label:"년 경력"}]},skills:{label:"// skills",heading:"기술 스택",categories:[{name:"AI & 머신러닝",tags:["Gemini API","OpenAI API","Apify","Computer Vision","Prompt Engineering","LLM 파이프라인"]},{name:"백엔드",tags:["Python","FastAPI","Flask","Google Apps Script","pandas","REST API"]},{name:"프론트엔드",tags:["React 19","TypeScript","Vite","Tailwind CSS","Fabric.js","Vanilla JS"]},{name:"클라우드 & DevOps",tags:["Google Cloud Run","GCS","Docker","GitHub Actions","Render","CI/CD"]},{name:"자동화",tags:["Google Sheets API","Google Slides API","Slack API","Chrome Extension MV3","Playwright","BeautifulSoup"]}]},projects:{label:"// projects",heading:"주요 프로젝트",viewDetail:"자세히 보기",close:"닫기",detailLabels:{problem:"// 문제",solution:"// 해결",impact:"// 성과",highlights:"// 기술 포인트",stack:"// 기술 스택"},items:[{num:"01",name:"Banner AI",desc:"AI 기반 이커머스 판촉 배너 생성 시스템 — 엑셀/Sheets 데이터를 넣으면 프로덕션용 PNG가 나옵니다.",tags:["Python","FastAPI","Gemini API","OpenAI","Cloud Run","Computer Vision","GCS"],featured:!0,detail:{problem:"마케팅팀이 시즌·상품마다 배너를 수작업으로 제작하고 있었습니다. 확장 가능한 템플릿 시스템이 없고, 실제 상품 데이터를 자동으로 반영할 방법도 없었습니다.",solution:"FastAPI 백엔드 + 캔버스 에디터 웹앱을 제작했습니다. 엑셀 또는 Google Sheets에서 상품 데이터를 불러와 템플릿 레이아웃 슬롯에 매핑하고, Gemini/OpenAI로 AI 배경·이미지를 생성한 뒤 PNG 또는 HTML 배너로 출력합니다. Figma URL 임포트로 디자이너가 코드 없이 레이아웃을 정의할 수 있습니다.",impact:"배너 제작 시간을 배치당 수 시간에서 수 분으로 단축했습니다. 데이터 입력부터 최종 출력까지 전 과정이 자동화되며, GitHub Actions → Cloud Run CI/CD로 배포됩니다.",highlights:["Gemini Vision & OpenAI DALL-E로 AI 배경·이미지 생성","rembg로 상품 사진 배경 자동 제거","레이어 관리, z-order, 텍스트 바인딩, 도형 도구가 포함된 캔버스 에디터","Google Cloud Storage를 이용한 에셋 영구 저장","GitHub Actions → Cloud Run CI/CD 자동 배포 파이프라인"]}},{num:"02",name:"Marketing Report",desc:"Instagram 월별 성과 리포트 자동 생성 — API 토큰 불필요, 수작업 없음, Gemini AI 인사이트 포함.",tags:["Python","Flask","Apify","Gemini API","GCS","python-pptx"],featured:!1,detail:{problem:"마케팅 담당자들은 월별 Instagram 성과 리포트가 필요했지만, Instagram Graph API의 복잡한 OAuth와 액세스 토큰을 관리할 개발 리소스가 없었습니다.",solution:"Apify 스크래퍼(토큰·비즈니스 계정 불필요)로 일간 프로필·릴스 데이터를 수집하는 Flask 웹앱을 만들었습니다. 전월 대비 KPI를 계산하고, 인터랙티브 HTML 리포트와 다운로드 가능한 PPTX 슬라이드를 생성하며, Gemini AI가 트렌드를 자연어로 요약하는 인사이트를 선택적으로 추가합니다.",impact:"수동 리포트 작성을 완전히 없앴습니다. 비기술직 마케터도 여러 계정의 데이터 기반 리포트를 즉시 생성할 수 있습니다.",highlights:["Apify 기반 스크래핑 — OAuth, 비즈니스 계정 완전 불필요","Gemini AI로 원시 KPI 데이터에서 내러티브 인사이트 자동 생성","python-pptx로 프레젠테이션용 슬라이드 덱 생성","GCS 일간 스냅샷으로 전월 대비 트렌드 추적"]}},{num:"03",name:"AutoSheet",desc:"스프레드시트 이미지·엑셀을 Google Sheets로 변환하고, 라이브커머스 큐시트 슬라이드를 자동으로 생성합니다.",tags:["FastAPI","Gemini Vision","Google Sheets API","Google Slides API","Cloud Run","OAuth2"],featured:!1,detail:{problem:"라이브커머스 팀이 상품 데이터를 제각각의 엑셀 형식으로 받아 Google Sheets로 직접 변환하고, 방송 진행자용 큐시트 슬라이드를 수동으로 만들어야 했습니다. 매일 반복되는 2단계 병목 작업이었습니다.",solution:"엑셀 파일, Google Sheet URL, 표 이미지 업로드를 모두 받는 FastAPI 서비스를 만들었습니다. Gemini Vision OCR이 표 이미지를 바로 구조화된 데이터로 파싱하고, AutoQue 모듈이 표준화된 시트를 읽어 상품 행마다 팀 레이아웃 템플릿에 맞는 Google Slides 큐시트를 자동 생성합니다.",impact:"데이터 재포매팅 → 슬라이드 제작 2단계 수작업을 파일 업로드 한 번으로 압축했습니다. Cloud Run에 계정별 OAuth2로 배포하여 팀원 각자가 자신의 데이터에 안전하게 접근합니다.",highlights:["Gemini Vision OCR로 표 이미지 → 구조화 데이터 직접 파싱","google-api-python-client를 통한 Sheets·Slides·Drive API 연동","계정별 OAuth2 인증 플로우","Cloud Run 배포 (asia-northeast3)"]}},{num:"04",name:"Influencer List Updater",desc:"Instagram 실시간 통계 수집 + Gemini AI 분류를 자동화하는 Google Apps Script 파이프라인.",tags:["Google Apps Script","Apify","Gemini API","Google Sheets","자동화"],featured:!1,detail:{problem:"마케팅팀이 인플루언서 스프레드시트를 수동으로 관리하며 팔로워 수, 참여율, 콘텐츠 카테고리를 매번 직접 조사했습니다. 주기당 2일 이상 걸리는 반복 작업이었습니다.",solution:"Instagram 핸들 목록을 시트에서 읽어 Apify Instagram Profile Scraper로 실시간 통계를 가져오고, 각 프로필을 Gemini API에 보내 카테고리를 분류한 뒤 시트 행을 그 자리에서 업데이트하는 Google Apps Script 파이프라인을 만들었습니다. Apify·Gemini API 한도 내에 유지되도록 일일 처리 쿼터를 설정할 수 있습니다.",impact:"인플루언서 데이터 갱신 주기를 2일+ 수작업에서 야간 자동 실행으로 단축했습니다. 추가 작업 없이 수백 개의 프로필에 적용됩니다.",highlights:["Apify Instagram Profile Scraper — API 자격증명 없이 실시간 통계 수집","Gemini API로 인플루언서 카테고리 자동 분류","Apps Script 시간 기반 트리거로 스케줄 실행","API 예산 준수를 위한 일일 쿼터 제한 설정"]}},{num:"05",name:"KLANG Website",desc:"공연 매칭 플랫폼의 공식 마케팅 사이트 — 반응형, 스크롤 애니메이션, 문의 폼.",tags:["React 18","TypeScript","Vite","Tailwind CSS 4","Radix UI","MUI"],featured:!1,detail:{problem:"공연 아티스트와 공연장을 연결하는 플랫폼 KLANG이 아티스트와 공연장 운영자 모두를 유치할 수 있는 완성도 높은 공식 웹사이트가 필요했습니다.",solution:"React 18, Vite, TypeScript, Tailwind CSS 4, Radix UI 프리미티브로 제작했습니다. IntersectionObserver 기반 스크롤 애니메이션, 인터랙티브 서비스 비교 섹션, 포트폴리오 캐러셀, 실시간 피드백이 있는 유효성 검사 문의 폼을 구현했습니다.",impact:"플랫폼의 공식 마케팅 사이트로 런칭되어 아티스트·공연장 리드 발굴의 핵심 채널로 기능합니다.",highlights:["React 18 + TypeScript + Vite 풀 타입세이프 구성","Tailwind CSS 4 유틸리티 스타일링과 반응형 브레이크포인트","Radix UI + MUI 컴포넌트 프리미티브 (접근성)","IntersectionObserver 기반 스크롤 트리거 애니메이션 시스템"]}},{num:"06",name:"imweb 취소알림 익스텐션",desc:"imweb 쇼핑몰에 취소요청 주문이 발생하는 즉시 데스크톱 알림을 보내는 Chrome 익스텐션 (MV3).",tags:["Chrome Extension MV3","Service Worker","imweb REST API","chrome.alarms"],featured:!1,detail:{problem:"imweb 쇼핑몰 관리자들이 취소요청 주문을 놓치는 일이 잦았습니다. 어드민 페이지를 직접 새로고침해야만 확인할 수 있어 대응이 늦어지고 분쟁·부정적 리뷰로 이어졌습니다.",solution:"Manifest V3 Chrome 익스텐션을 만들었습니다. 백그라운드 Service Worker가 chrome.alarms로 설정된 간격마다 imweb REST API를 폴링합니다. CANCEL_REQUEST 상태가 감지되는 순간 주문번호와 함께 네이티브 데스크톱 알림을 발송합니다. 옵션 페이지에서 API Key/Secret와 폴링 간격을 코드 수정 없이 설정할 수 있습니다.",impact:"쇼핑몰 관리자에게 실시간 취소 알림을 제공합니다. 배포 후 미처리 취소요청이 0건으로 감소했습니다.",highlights:["Chrome Extension Manifest V3 + Service Worker 아키텍처","chrome.alarms로 백그라운드 폴링 간격 관리","chrome.notifications로 네이티브 데스크톱 푸시 알림","chrome.storage로 API 자격증명 안전 저장"]}},{num:"07",name:"SMB 플랫폼 모니터",desc:"JS 렌더링 정부 포털을 크롤링해 신규 공고 발생 시 즉시 이메일 알림을 보내는 헤드리스 크롤러.",tags:["Python","Playwright","BeautifulSoup","SMTP","Cloud Run Jobs"],featured:!1,detail:{problem:"중소기업들이 혁신바우처 공고가 올라오는 즉시 신청하려면 포털을 수시로 확인해야 했지만, 해당 포털은 JavaScript 렌더링 방식이라 RSS도 API도 없었습니다.",solution:"Playwright(헤드리스 Chromium)으로 JS 렌더링 페이지를 완전히 로드하고, BeautifulSoup으로 공고 목록을 파싱하며, JSON 상태 파일과 diff해 신규 게시글을 감지합니다. 새 공고 발생 즉시 SMTP 이메일 알림을 발송합니다. Cloud Run Job, Cloud Function, 로컬 cron으로 스케줄링 가능하며 --test-email 플래그로 설정 검증을 지원합니다.",impact:"매일 수동 확인 대신 공고 게시 수 분 내에 알림을 받아 정부 지원사업에 신속하게 대응할 수 있습니다.",highlights:["Playwright 헤드리스 Chromium으로 JS 렌더링 페이지 스크래핑","BeautifulSoup으로 HTML 공고 목록 파싱","JSON 상태 파일 diff로 신규 게시글 신뢰성 있게 감지","Gmail 호환 SMTP 이메일 알림"]}}]},con
